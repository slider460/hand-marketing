# WebP-негоциация в nginx для hand-marketing.ru (вариант для панели Reg.ru/ISPmanager)
# ============================================================================
# ПОЧЕМУ: на Reg.ru nginx отдаёт статику (картинки) напрямую, минуя Apache,
# поэтому правило WebP в .htaccess НЕ работает. Файлы .webp уже на сервере
# рядом с оригиналами (имя <файл>.png.webp / <файл>.jpg.webp).
#
# КУДА ВСТАВИТЬ (ISPmanager):
#   Сайты → hand-marketing.ru → «Конфигурация nginx» (или поле
#   «Директивы nginx» / «Пользовательские директивы») → вставить блок ниже →
#   сохранить (панель сама сделает reload nginx).
#
# Этот вариант работает ВНУТРИ server{} (без http-level `map`), поэтому
# подходит для пер-сайтовой конфигурации в панели.
# ============================================================================

location ~* ^/.+\.(png|jpe?g)$ {
    add_header Vary Accept;
    set $webp "";
    if ($http_accept ~* "image/webp") { set $webp ".webp"; }
    # есть <файл>.webp и браузер поддерживает webp -> отдать его;
    # иначе -> оригинал ($uri всегда существует).
    try_files ${uri}${webp} $uri =404;
    expires 1y;
    access_log off;
}

# Если после применения Content-Type для .webp приходит неверный
# (не image/webp) — добавить в этот же location:
#     types { image/webp webp; image/png png; image/jpeg jpg jpeg; }

# ----------------------------------------------------------------------------
# АЛЬТЕРНАТИВА (если есть полный доступ к nginx.conf, http-контекст):
#   map $http_accept $webp_suffix { default ""; "~*image/webp" ".webp"; }
#   # затем в location: try_files ${uri}${webp_suffix} $uri =404;
# ----------------------------------------------------------------------------

# ПРОВЕРКА (после применения):
#   curl -s -H 'Accept: image/webp' -o /dev/null -w '%{content_type}\n' \
#     https://hand-marketing.ru/static/cdn/as3135-3335-4734-a337-396563373033/photo.png
#     -> ожидаем: image/webp
#   curl -s -H 'Accept: image/*' -o /dev/null -w '%{content_type}\n' <тот же URL>
#     -> ожидаем: image/png
