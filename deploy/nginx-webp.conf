# WebP-негоциация на уровне nginx для hand-marketing.ru
# ----------------------------------------------------------------------------
# ПОЧЕМУ: на этом хостинге (Reg.ru) nginx отдаёт статику (картинки) напрямую,
# минуя Apache, поэтому правило WebP в .htaccess не срабатывает. Негоциацию
# нужно настроить в nginx. Файлы .webp уже лежат рядом с оригиналами
# (имя <файл>.png.webp / <файл>.jpg.webp, сгенерированы scripts/gen-webp.sh).
#
# КАК ПРИМЕНИТЬ: добавить в конфиг сайта в панели Reg.ru (ISPmanager →
# «Сайты» → домен → «Конфигурация nginx») либо через тикет в поддержку Reg.ru
# с просьбой добавить эти директивы для домена hand-marketing.ru.
# ----------------------------------------------------------------------------

# 1) В контекст http {} (или отдельным include на уровне http):
map $http_accept $webp_suffix {
    default        "";
    "~*image/webp" ".webp";
}

# 2) В контекст server {} нужного домена — ДО общего location для статики:
location ~* ^/.+\.(png|jpe?g)$ {
    add_header Vary Accept;
    # если есть <файл>.webp и браузер шлёт Accept: image/webp — отдать webp,
    # иначе — оригинал. =404 не вернётся: $uri (оригинал) всегда существует.
    try_files ${uri}${webp_suffix} $uri =404;
    expires 1y;
    access_log off;
}

# Тип image/webp должен быть в mime.types (nginx ≥1.11 — есть по умолчанию).
# Если нет, добавить в types {}:  image/webp  webp;
#
# ПРОВЕРКА после применения:
#   curl -s -H 'Accept: image/webp' -o /dev/null -w '%{content_type}\n' \
#        https://hand-marketing.ru/static/cdn/.../photo.png      # -> image/webp
#   curl -s -H 'Accept: image/*'    -o /dev/null -w '%{content_type}\n' \
#        https://hand-marketing.ru/static/cdn/.../photo.png      # -> image/png
#
# Если Reg.ru не даёт править nginx — альтернатива в HTML через <picture>
# (server-independent, но трогает разметку; см. обсуждение в чате).
