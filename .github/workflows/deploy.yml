name: Deploy site to hosting

# Автодеплой: при каждом пуше в main содержимое mirror/ выкладывается на хостинг.
# Метод выбирается секретом DEPLOY_METHOD: "ftp" (по умолчанию) или "ssh".
# Нужные секреты задаются в GitHub: Settings → Secrets and variables → Actions.

on:
  push:
    branches: [main]
    paths: ['mirror/**', '.github/workflows/deploy.yml']
  workflow_dispatch: {}

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy-ftp:
    if: ${{ vars.DEPLOY_METHOD == 'ftp' || vars.DEPLOY_METHOD == '' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Попытка 1 — не валим джобу при разовом таймауте FTP
      - name: Upload via FTP/FTPS (attempt 1)
        id: ftp1
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ${{ vars.FTP_PROTOCOL || 'ftps' }}
          port: ${{ vars.FTP_PORT || 21 }}
          timeout: 120000
          local-dir: ./mirror/
          server-dir: ${{ vars.FTP_REMOTE_DIR || './public_html/' }}
          # leads.csv создаётся на сервере формами — не перетирать/не удалять
          exclude: |
            **/.git*
            **/.git*/**
            **/api/leads.csv
            **/*.bak
      # Попытка 2 — только если первая упала (разрыв соединения и т.п.)
      - name: Retry on transient failure (attempt 2)
        if: steps.ftp1.outcome == 'failure'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ${{ vars.FTP_PROTOCOL || 'ftps' }}
          port: ${{ vars.FTP_PORT || 21 }}
          timeout: 180000
          local-dir: ./mirror/
          server-dir: ${{ vars.FTP_REMOTE_DIR || './public_html/' }}
          exclude: |
            **/.git*
            **/.git*/**
            **/api/leads.csv
            **/*.bak

  deploy-ssh:
    if: ${{ vars.DEPLOY_METHOD == 'ssh' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${{ vars.SSH_PORT || 22 }}" "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null
      - name: Rsync mirror/ to server
        run: |
          rsync -az --delete \
            --exclude='api/leads.csv' --exclude='*.bak' \
            -e "ssh -p ${{ vars.SSH_PORT || 22 }} -i ~/.ssh/id_ed25519" \
            ./mirror/ "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ vars.SSH_REMOTE_DIR }}"
